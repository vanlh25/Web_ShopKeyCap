spring.config.import=optional:file:.env[.properties]
spring.application.name=vnpay-demo
server.port=8080

# H2 database để demo lưu đơn hàng ngay trên máy local.
spring.datasource.url=jdbc:h2:mem:vnpaydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Cấu hình VNPAY Sandbox.
# Không đưa TmnCode/HashSecret thật lên GitHub. Khi chạy, đặt qua biến môi trường.
# ===============================
# VNPAY SANDBOX CONFIG
# ===============================
vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.return-url=${VNPAY_RETURN_URL}
vnpay.version=2.1.0
vnpay.command=pay
vnpay.curr-code=VND
vnpay.locale=vn
vnpay.order-type=other
vnpay.expire-minutes=15
